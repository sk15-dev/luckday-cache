name: Gerar caches LuckDay

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  cache:
    runs-on: ubuntu-latest

    steps:

      - name: Baixar código
        uses: actions/checkout@v4


      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'


      - name: Rodar cache PT
        run: php gera_api.php pt-BR


      - name: Rodar cache EN
        run: php gera_api.php en-US


      - name: Rodar cache ES
        run: php gera_api.php es-ES


      - name: Salvar arquivos
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cache/
          git commit -m "Atualiza caches" || exit 0
          git push
