name: Gerar caches LuckDay

on:
  schedule:
    # 00h01 UTC Brasil
    - cron: '1 3 * * *'

  # permite rodar manualmente pelo botão Actions
  workflow_dispatch:

concurrency:
  group: cache-luckday
  cancel-in-progress: false

permissions:
 contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Baixar código
        uses: actions/checkout@v4
        with:
         fetch-depth: 0

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Rodar cache PT
        run: php gera_api.php pt-BR

      - name: Pausa API
        run: sleep 30

      - name: Rodar cache EN
        run: php gera_api.php en-US
     
      - name: Pausa API
        run: sleep 30
        
      - name: Rodar cache ES
        run: php gera_api.php es-ES

      # Segunda tentativa
      #- name: Esperar antes do retry
      #  run: sleep 180
  
      #- name: Retry PT-BR
      #  run: php gera_api.php pt-BR

      #- name: Retry EN-US
      #  run: php gera_api.php en-US

      #- name: Retry ES-ES
      #  run: php gera_api.php es-ES
      
      - name: Limpar caches antigos
        run: |
          find cache -mindepth 3 -type d -mtime +30 -exec rm -rf {} +
          find cache -type d -empty -delete

      - name: Salvar arquivos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache/
          git commit -m "Atualiza caches" || exit 0
          
          # Puxa as alterações remotas e joga seus novos JSONs no topo
          git pull --rebase origin main
          
          git push
